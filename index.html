<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
}
.container{padding:20px;}

.numbers{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(70px,1fr));
  gap:10px;
  max-width:700px;
  margin:auto;
}

.number-btn{
  padding:18px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.hidden{display:none;}

.question-box{
  max-width:600px;
  margin:30px auto;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

.option{
  display:block;
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:white;
  cursor:pointer;
}

.result{margin-top:15px;font-size:18px;}

.prize-btn{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#f59e0b;
  color:white;
  cursor:pointer;
}

.score{
  font-size:40px;
  margin-top:15px;
  color:#22c55e;
}
</style>
</head>

<body>

<div class="container" id="homePage">
<h1>30 Savolli Quiz</h1>
<div class="numbers" id="numbersContainer"></div>
</div>

<div class="question-box hidden" id="questionPage">
<h2 id="questionTitle"></h2>
<div id="optionsContainer"></div>
<p class="result" id="resultText"></p>

<!-- RANDOM BUTTON SHU YERDA CHIQADI -->
<div id="rewardBox"></div>

</div>

<script>

const questions = [
{q:"2+2=?",o:["3","4","5","6"],a:"4"},
{q:"O‘zbekiston poytaxti?",o:["Toshkent","Buxoro","Samarqand","Andijon"],a:"Toshkent"},
{q:"5*5=?",o:["10","20","25","30"],a:"25"},
{q:"Suv formulasi?",o:["CO2","H2O","O2","NaCl"],a:"H2O"},
{q:"10-3=?",o:["5","6","7","8"],a:"7"},
{q:"Eng katta sayyora?",o:["Yer","Mars","Yupiter","Venera"],a:"Yupiter"},
{q:"3+3=?",o:["5","6","7","8"],a:"6"},
{q:"HTML nima?",o:["Til","O‘yin","Kitob","Film"],a:"Til"},
{q:"Yer shakli?",o:["Shar","Kub","Yassi","Doira"],a:"Shar"},
{q:"8/2=?",o:["2","3","4","5"],a:"4"}
];

// 30 ta bo‘lishi uchun takrorlab to‘ldiramiz
while(questions.length < 30){
  questions.push({
    q:`${questions.length+1}-savol`,
    o:["A","B","C","D"],
    a:"A"
  });
}

let currentIndex = null;

const container = document.getElementById("numbersContainer");

for(let i=0;i<30;i++){
  let btn=document.createElement("button");
  btn.className="number-btn";
  btn.innerText=i+1;
  btn.id=`btn-${i+1}`;
  btn.onclick=()=>openQ(i);
  container.appendChild(btn);
}

function openQ(i){
  currentIndex = i;

  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("questionPage").classList.remove("hidden");

  let q=questions[i];

  document.getElementById("questionTitle").innerText=q.q;

  let box=document.getElementById("optionsContainer");
  box.innerHTML="";
  document.getElementById("resultText").innerText="";
  document.getElementById("rewardBox").innerHTML="";

  q.o.forEach(opt=>{
    let b=document.createElement("button");
    b.className="option";
    b.innerText=opt;

    b.onclick=()=>{
      if(opt===q.a){
        document.getElementById("resultText").innerText="✅ To‘g‘ri javob!";

        document.getElementById(`btn-${i+1}`).style.background="#16a34a";

        // 🔥 RANDOM TUGMA CHIQADI
        document.getElementById("rewardBox").innerHTML=`
          <button class="prize-btn" onclick="getRandom()">🎁 Random ball olish</button>
          <div id="score"></div>
        `;
      } else {
        document.getElementById("resultText").innerText="❌ Noto‘g‘ri!";
      }
    };

    box.appendChild(b);
  });
}

function getRandom(){
  let score = Math.floor(Math.random()*11) - 5; // -5 dan +5
  document.getElementById("score").innerHTML =
    `<div class="score">${score}</div>`;
}

</script>

</body>
</html>
