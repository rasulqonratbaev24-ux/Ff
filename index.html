<!DOCTYPE html><html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>30 Savolli Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }h1 {
  margin-top: 20px;
}

.container {
  padding: 20px;
}

.numbers {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: 10px;
  max-width: 700px;
  margin: auto;
}

.number-btn {
  padding: 18px;
  border: none;
  border-radius: 15px;
  background: #2563eb;
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

.number-btn:hover {
  background: #1d4ed8;
  transform: scale(1.05);
}

.hidden {
  display: none;
}

.question-box {
  max-width: 600px;
  margin: 30px auto;
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 20px;
}

.option {
  display: block;
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #334155;
  color: white;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.option:hover {
  background: #475569;
}

.result {
  font-size: 26px;
  margin-top: 20px;
  font-weight: bold;
}

.score {
  font-size: 70px;
  margin-top: 20px;
  color: #22c55e;
  animation: pop 0.5s ease;
}

.prizes {
  margin-top: 25px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}

.prize {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 15px;
  font-size: 18px;
}

.back-btn {
  margin-top: 25px;
  padding: 14px 25px;
  border: none;
  border-radius: 12px;
  background: #16a34a;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

.back-btn:hover {
  background: #15803d;
}

@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

  </style>
</head>
<body>  <!-- Fon musiqasi -->  <audio id="bgMusic" autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>  <button onclick="toggleMusic()" style="position:fixed;top:15px;right:15px;padding:10px 15px;border:none;border-radius:10px;background:#f59e0b;color:white;cursor:pointer;z-index:1000;">
    🎵 Musiqani yoq/o‘chir
  </button>  <div class="container" id="homePage">
    <h1>30 Savolli Quiz</h1>
    <p>Raqamni tanlang va savolga javob bering</p><div class="numbers" id="numbersContainer"></div>

  </div>  <div class="question-box hidden" id="questionPage">
    <h2 id="questionTitle"></h2>
    <div id="optionsContainer"></div>
    <p class="result" id="resultText"></p>
  </div>  <div class="container hidden" id="rewardPage">
    <h1>🎉 Tabriklaymiz!</h1>
    <p>Sizning random balingiz:</p>
    <div class="score" id="scoreValue"></div><h2>🎁 Random 5 ta priz</h2>
<div class="prizes" id="prizeContainer"></div>

<button class="back-btn" onclick="goHome()">Bosh sahifaga qaytish</button>

  </div>  <script>
    const questions = [];

    for (let i = 1; i <= 30; i++) {
      questions.push({
        question: `${i}-savol`,
        options: ["🎁 PRIZE", "🎁 PRIZE", "🎁 PRIZE", "🎁 PRIZE"],
        answer: "🎁 PRIZE"
      });
    }

    const prizes = [
      "🎁 PRIZE",
      "🎁 PRIZE",
      "🎁 PRIZE",
      "🎁 PRIZE",
      "🎁 PRIZE"
    ];

    let currentNumber = 1;

    const numbersContainer = document.getElementById("numbersContainer");

    for (let i = 1; i <= 30; i++) {
      const btn = document.createElement("button");
      btn.className = "number-btn";
      btn.innerText = i;
      btn.id = `btn-${i}`;

      if (i !== 1) {
        btn.disabled = true;
        btn.style.opacity = "0.4";
      }

      btn.onclick = () => openQuestion(i - 1);
      numbersContainer.appendChild(btn);
    }

    function openQuestion(index) {
      document.getElementById("homePage").classList.add("hidden");
      document.getElementById("questionPage").classList.remove("hidden");

      document.getElementById("questionTitle").innerHTML = `
        <button class="back-btn" onclick="showRandomPrizes()">🎁 Random Prize Ochish</button>
      `;

      const q = questions[index];

      document.getElementById("questionTitle").innerText = `🎁 ${index + 1}-son ichidagi PRIZE`;

      const optionsContainer = document.getElementById("optionsContainer");
      optionsContainer.innerHTML = "";

      document.getElementById("resultText").innerText = "";

      q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = option;

        btn.onclick = () => {
          if (option === q.answer) {
            document.getElementById("resultText").innerText = "✅ To'g'ri javob! Keyingi raqam ochildi";

            if (currentNumber < 30) {
              currentNumber++;
              const nextBtn = document.getElementById(`btn-${currentNumber}`);
              nextBtn.disabled = false;
              nextBtn.style.opacity = "1";
            }

          } else {
            document.getElementById("resultText").innerText = "❌ Noto'g'ri! To'g'ri topmaguncha keyingi raqam ochilmaydi";
          }
        };

        optionsContainer.appendChild(btn);
      });
    }

    function showRandomPrizes() {
      document.getElementById("questionPage").classList.add("hidden");
      document.getElementById("rewardPage").classList.remove("hidden");

      const randomScore = Math.floor(Math.random() * 11) - 5;
      document.getElementById("scoreValue").innerHTML = `
        <button class="back-btn" onclick="showScore()">🎲 Ballni Tanlash</button>
      `;

      const shuffled = [...prizes].sort(() => 0.5 - Math.random());
      const selectedPrizes = shuffled.slice(0, 5);

      const prizeContainer = document.getElementById("prizeContainer");
      prizeContainer.innerHTML = "";

      selectedPrizes.forEach(() => {
        const div = document.createElement("div");
        div.className = "prize";
        div.innerText = `🎁 PRIZE`;
        prizeContainer.appendChild(div);
      });

      window.randomFinalScore = randomScore;
    }

    function showScore() {
      document.getElementById("scoreValue").innerHTML = `<div class='score'>${window.randomFinalScore}</div>`;
    }

    function toggleMusic() {
      const music = document.getElementById("bgMusic");

      if (music.paused) {
        music.play();
      } else {
        music.pause();
      }
    }

    function goHome() {
      document.getElementById("rewardPage").classList.add("hidden");
      document.getElementById("homePage").classList.remove("hidden");
    }
  </script></body>
</html>
