<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Savolli Quiz</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
}
.container{padding:20px;}
.numbers{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(70px,1fr));
  gap:10px;
  max-width:700px;
  margin:auto;
}
.number-btn{
  padding:18px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:18px;
  cursor:pointer;
}
.hidden{display:none;}

.question-box{
  max-width:600px;
  margin:30px auto;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

.option{
  display:block;
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:white;
  cursor:pointer;
}

.result{margin-top:15px;font-size:18px;}

.prizes{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:20px;
}

.prize{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container" id="homePage">
<h1>30 Savolli Quiz</h1>
<div class="numbers" id="numbersContainer"></div>
</div>

<div class="question-box hidden" id="questionPage">
<h2 id="questionTitle"></h2>
<div id="optionsContainer"></div>
<p class="result" id="resultText"></p>
<button onclick="goHome()">⬅ Orqaga</button>
</div>

<div class="container hidden" id="rewardPage">
<h1>🎉 Random Prizlar</h1>
<div class="prizes" id="prizeContainer"></div>
<button onclick="goHome()">Bosh sahifa</button>
</div>

<script>

const questions = [
{q:"O‘zbekiston poytaxti?",o:["Buxoro","Toshkent","Samarqand","Andijon"],a:"Toshkent"},
{q:"2+2=?",o:["3","4","5","6"],a:"4"},
{q:"Eng katta sayyora?",o:["Yer","Mars","Yupiter","Venera"],a:"Yupiter"},
{q:"3*3=?",o:["6","9","12","3"],a:"9"},
{q:"Suv formulasi?",o:["CO2","H2O","O2","NaCl"],a:"H2O"},
{q:"O‘zbekiston nechta viloyat?",o:["10","12","14","16"],a:"12"},
{q:"Eng tez hayvon?",o:["Arslon","Qoplon","Gepar","Bo‘ri"],a:"Gepar"},
{q:"5+5=?",o:["10","11","9","8"],a:"10"},
{q:"Quyosh nima?",o:["Yulduz","Sayyora","Oy","Gaz"],a:"Yulduz"},
{q:"10-3=?",o:["6","7","8","9"],a:"7"},
{q:"HTML nima?",o:["Til","O‘yin","Kitob","Film"],a:"Til"},
{q:"Yer nechanchi sayyora?",o:["1","2","3","4"],a:"3"},
{q:"12/2=?",o:["5","6","7","8"],a:"6"},
{q:"Eng katta okean?",o:["Atlantika","Hind","Tinch","Shimoliy"],a:"Tinch"},
{q:"Python nima?",o:["Til","Hayvon","Mashina","Oziq"],a:"Til"},
{q:"9+1=?",o:["10","11","9","12"],a:"10"},
{q:"1 soat nechta minut?",o:["50","60","70","100"],a:"60"},
{q:"O‘zbekiston mustaqilligi?",o:["1990","1991","1992","1993"],a:"1991"},
{q:"20/4=?",o:["4","5","6","7"],a:"5"},
{q:"Eng baland tog‘?",o:["Everest","K2","And","Alp"],a:"Everest"},
{q:"7+7=?",o:["14","15","16","13"],a:"14"},
{q:"Dunyo aholisi yashaydi?",o:["Mars","Yer","Oy","Quyosh"],a:"Yer"},
{q:"100-50=?",o:["40","50","60","70"],a:"50"},
{q:"Eng katta qit’a?",o:["Osiyo","Yevropa","Afrika","Amerika"],a:"Osiyo"},
{q:"4*4=?",o:["12","14","16","18"],a:"16"},
{q:"Suv qaynash harorati?",o:["90","100","80","110"],a:"100"},
{q:"8+2=?",o:["9","10","11","12"],a:"10"},
{q:"Oy nima?",o:["Yulduz","Sayyora","Tabiiy yo‘ldosh","Gaz"],a:"Tabiiy yo‘ldosh"},
{q:"6*2=?",o:["10","12","14","16"],a:"12"},
{q:"Yer shakli?",o:["Yassi","Shar","Kub","Doira"],a:"Shar"}
];

const prizeNumbers = [];
while(prizeNumbers.length < 5){
  let r = Math.floor(Math.random()*30)+1;
  if(!prizeNumbers.includes(r)) prizeNumbers.push(r);
}

const container = document.getElementById("numbersContainer");

for(let i=0;i<30;i++){
  let btn=document.createElement("button");
  btn.className="number-btn";
  btn.innerText=i+1;
  btn.id=`btn-${i+1}`;
  btn.onclick=()=>openQ(i);
  container.appendChild(btn);
}

function openQ(i){
  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("questionPage").classList.remove("hidden");

  let q=questions[i];

  document.getElementById("questionTitle").innerText=q.q;

  let box=document.getElementById("optionsContainer");
  box.innerHTML="";
  document.getElementById("resultText").innerText="";

  q.o.forEach(opt=>{
    let b=document.createElement("button");
    b.className="option";
    b.innerText=opt;

    b.onclick=()=>{
      if(opt===q.a){
        document.getElementById("resultText").innerText="✅ To‘g‘ri!";
        document.getElementById(`btn-${i+1}`).style.background="#16a34a";
        document.getElementById(`btn-${i+1}`).innerText="✔ "+(i+1);
      } else {
        document.getElementById("resultText").innerText="❌ Noto‘g‘ri!";
      }
    };

    box.appendChild(b);
  });
}

function goHome(){
  document.getElementById("questionPage").classList.add("hidden");
  document.getElementById("rewardPage").classList.add("hidden");
  document.getElementById("homePage").classList.remove("hidden");
}

function showPrizes(){
  document.getElementById("rewardPage").classList.remove("hidden");

  let box=document.getElementById("prizeContainer");
  box.innerHTML="";

  prizeNumbers.forEach(n=>{
    let d=document.createElement("div");
    d.className="prize";
    d.innerText="🎁 Prize "+n;
    box.appendChild(d);
  });
}

</script>

</body>
</html>
